name: Build, Publish, and Release Docker Image

on:
  push:
    branches: ['main']
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_REPO: omnibus 

jobs:
  # --- 1. THE GATEKEEPER: Run tests before touching Docker ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
      - name: Run Tests
        # Runs the suite silently as a pass/fail gatekeeper
        run: npm run test

  # --- 2. THE PUBLISHER: Build and Push ---
  build-and-push-image:
    needs: test # <-- CRITICAL: This tells Docker to wait for tests to pass!
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- AUTOMATED RELEASE STEPS ---
      - name: Get version from package.json
        id: package-version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Check if Release exists
        id: check-release
        run: |
          if gh release view v${{ env.VERSION }} &>/dev/null; then
            echo "EXISTS=true" >> $GITHUB_ENV
          else
            echo "EXISTS=false" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: env.EXISTS == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.VERSION }}
          name: Omnibus v${{ env.VERSION }}
          body: |
            ${{ github.event.head_commit.message || 'Automated release for version update.' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- DOCKER BUILD STEPS ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=v${{ env.VERSION }},enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=ref,event=tag
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CACHEBUST=${{ github.run_id }}

      - name: Update Docker Hub Description
        if: success() 
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README-docker.md

      # --- DOCKER DISCORD NOTIFICATION ---
      - name: Send Discord Notification (Docker Published)
        if: success() 
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_BUILDS }}
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          VERSION="v${{ env.VERSION }}"
          
          PAYLOAD=$(jq -n \
            --arg title "🐳 Docker Image Published" \
            --arg desc "Omnibus $VERSION has been built and published to GHCR and Docker Hub." \
            --arg version "$VERSION" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "\`$COMMIT_SHORT\`" \
            --arg pull "\`\`\`docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest\`\`\`" \
            --arg footer "Omnibus $VERSION • Built with GitHub Actions" \
            --arg time "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: 3447003,
                fields: [
                  { name: "🏷️ Version", value: $version, inline: true },
                  { name: "🌿 Branch", value: $branch, inline: true },
                  { name: "🔗 Commit", value: $commit, inline: true },
                  { name: "💻 Pull Command", value: $pull, inline: false }
                ],
                footer: { text: $footer },
                timestamp: $time
              }]
            }' \
          )
          
          curl -H "Content-Type: application/json" -d "$PAYLOAD" $DISCORD_WEBHOOK