name: Build, Publish, and Release Docker Image

# This tells GitHub to run the script whenever you push to the 'main' branch
# or whenever you publish a new Release tag (like v1.0.0-beta.1)
on:
  push:
    branches: ['main']
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  # Converts your GitHub username and repository name into the image name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # REQUIRED PERMISSIONS: 
    # contents: write -> Needed to create the GitHub Release & Tag
    # packages: write -> Needed to push the Docker image to ghcr.io
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches history so commit messages are available

      # --- AUTOMATED RELEASE STEPS ---
      
      - name: Get version from package.json
        id: package-version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Check if Release exists
        id: check-release
        run: |
          if gh release view v${{ env.VERSION }} &>/dev/null; then
            echo "EXISTS=true" >> $GITHUB_ENV
          else
            echo "EXISTS=false" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        # Removed the strict 'main' branch requirement. Now triggers on tags too!
        if: env.EXISTS == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.VERSION }}
          name: Omnibus v${{ env.VERSION }}
          # Grabs commit message, with a fallback if triggered via tag
          body: |
            ${{ github.event.head_commit.message || 'Automated release for version update.' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- DOCKER BUILD STEPS ---

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub provides this token automatically!

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tags the image as 'latest' on main branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            # Tags the image with the package.json version on main branch
            type=raw,value=v${{ env.VERSION }},enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            # Falls back to standard tag/sha extraction for other events
            type=ref,event=tag
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # This caching makes subsequent builds massively faster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Send Discord Notification (Docker Published)
        if: success() # Only runs if the image builds and pushes successfully
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_BUILDS }}
        run: |
          # 1. Format variables
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          VERSION="v${{ env.VERSION }}"
          
          # 2. Safely construct JSON payload using jq
          PAYLOAD=$(jq -n \
            --arg title "🐳 Docker Image Published" \
            --arg desc "Omnibus $VERSION has been built and published to GitHub Container Registry." \
            --arg version "$VERSION" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "\`$COMMIT_SHORT\`" \
            --arg pull "\`\`\`bash\ndocker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\n\`\`\`" \
            --arg footer "Omnibus $VERSION • Built with GitHub Actions" \
            --arg time "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: 3447003,
                fields: [
                  { name: "Version", value: $version, inline: true },
                  { name: "Branch", value: $branch, inline: true },
                  { name: "Commit", value: $commit, inline: true },
                  { name: "Pull Command", value: $pull, inline: false }
                ],
                footer: { text: $footer },
                timestamp: $time
              }]
            }' \
          )
          
          # 3. Post to Discord
          curl -H "Content-Type: application/json" -d "$PAYLOAD" $DISCORD_WEBHOOK