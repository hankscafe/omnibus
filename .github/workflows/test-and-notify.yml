name: Build, Test & Notify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # --- ACTUALLY RUN THE NEW VITEST SUITE ---
      - name: Run Tests
        run: npm run test

      # --- VERIFY THE APP STILL COMPILES ---
      - name: Build Application
        run: npm run build

      - name: Send Discord Notification
        if: always() 
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_BUILDS }}
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          if [ "${{ job.status }}" = "success" ]; then
            COLOR=3066993 # Green
            TITLE="✅ Tests Passed"
            DESC="Vitest security suite and Next.js build completed successfully."
            TEST_STATUS="Passed"
          else
            COLOR=15158332 # Red
            TITLE="❌ Build or Tests Failed"
            DESC="The pipeline failed for Omnibus. Please click the Workflow link to review the errors."
            TEST_STATUS="Failed"
          fi
          
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg color "$COLOR" \
            --arg status "$TEST_STATUS" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "\`$COMMIT_SHORT\`" \
            --arg workflow "[View Run]($WORKFLOW_URL)" \
            --arg footer "Omnibus CI/CD • Test Suite" \
            --arg time "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: ($color | tonumber),
                fields: [
                  { name: "Status", value: $status, inline: true },
                  { name: "Branch", value: $branch, inline: true },
                  { name: "Commit", value: $commit, inline: true },
                  { name: "Workflow", value: $workflow, inline: false }
                ],
                footer: { text: $footer },
                timestamp: $time
              }]
            }' \
          )
          
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" -d "$PAYLOAD" $DISCORD_WEBHOOK
          fi