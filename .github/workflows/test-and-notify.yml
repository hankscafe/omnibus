name: Build, Test & Notify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      # --- 1. CHANGED TO BUILD INSTEAD OF TEST ---
      # This verifies that your Next.js app compiles without errors
      - name: Build Application
        run: npm run build

      - name: Send Discord Notification
        if: always() # CRITICAL: Ensures this runs even if the build fails
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_BUILDS }}
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # --- 2. RESTORED HARDCODED METRICS ---
          # Since you don't have automated tests yet, we will use your requested placeholder numbers
          TEST_FILES="188 passed (188)"
          TEST_COUNT="2099 passed (2099)"
          DURATION="79.63s"
          
          # Change color and text based on GitHub's overall job status
          if [ "${{ job.status }}" = "success" ]; then
            COLOR=3066993 # Green
            TITLE="✅ Tests Passed"
            DESC="All tests completed successfully for Omnibus"
          else
            COLOR=15158332 # Red
            TITLE="❌ Build Failed"
            DESC="The build failed for Omnibus. Please click the Workflow link to review the errors."
            # If the build fails, we change the dummy numbers to reflect a failure
            TEST_FILES="0 passed"
            TEST_COUNT="0 passed"
          fi
          
          # --- 3. SEND THE PAYLOAD ---
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg color "$COLOR" \
            --arg files "$TEST_FILES" \
            --arg tests "$TEST_COUNT" \
            --arg duration "$DURATION" \
            --arg branch "${{ github.ref_name }}" \
            --arg commit "\`$COMMIT_SHORT\`" \
            --arg workflow "[View Run]($WORKFLOW_URL)" \
            --arg footer "Omnibus CI/CD • Test Suite" \
            --arg time "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: ($color | tonumber),
                fields: [
                  { name: "Test Files", value: $files, inline: true },
                  { name: "Tests", value: $tests, inline: true },
                  { name: "Duration", value: $duration, inline: true },
                  { name: "Branch", value: $branch, inline: true },
                  { name: "Commit", value: $commit, inline: true },
                  { name: "Workflow", value: $workflow, inline: true }
                ],
                footer: { text: $footer },
                timestamp: $time
              }]
            }' \
          )
          
          # Safety check to ensure the webhook URL actually exists
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Error: DISCORD_BUILDS secret is missing or empty. Skipping notification."
            exit 0
          else
            curl -H "Content-Type: application/json" -d "$PAYLOAD" $DISCORD_WEBHOOK
          fi