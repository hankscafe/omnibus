name: Build, Test & Notify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # --- 1. RECORD START TIME ---
      - name: Record Start Time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      # --- 2. RUN TESTS & GENERATE JSON ---
      # We tell Vitest to output nicely to the console (default) AND save a JSON file for Discord
      - name: Run Tests
        run: npx vitest run --reporter=default --reporter=json --outputFile.json=vitest-results.json

      - name: Build Application
        run: npm run build

      # --- 3. DYNAMIC DISCORD NOTIFICATION ---
      - name: Send Discord Notification
        if: always() 
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_BUILDS }}
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Calculate total duration
          END_TIME=$(date +%s)
          DURATION="$((END_TIME - START_TIME))s"
          
          # Extract real metrics from the Vitest JSON report using jq
          if [ -f vitest-results.json ]; then
            TOTAL_SUITES=$(jq -r '.numTotalTestSuites // 0' vitest-results.json)
            PASSED_SUITES=$(jq -r '.numPassedTestSuites // 0' vitest-results.json)
            TOTAL_TESTS=$(jq -r '.numTotalTests // 0' vitest-results.json)
            PASSED_TESTS=$(jq -r '.numPassedTests // 0' vitest-results.json)
            
            TEST_FILES="${PASSED_SUITES} passed (${TOTAL_SUITES})"
            TEST_COUNT="${PASSED_TESTS} passed (${TOTAL_TESTS})"
          else
            TEST_FILES="0 passed"
            TEST_COUNT="0 passed"
          fi
          
          # Set colors and titles based on the job status
          if [ "${{ job.status }}" = "success" ]; then
            COLOR=3066993 # Green
            TITLE="✅ Tests Succeeded"
            DESC="Vitest security suite and Next.js build completed successfully."
            TEST_STATUS="Passed"
          else
            COLOR=15158332 # Red
            TITLE="❌ Tests Failed"
            DESC="The pipeline failed for Omnibus. Please click the Workflow link to review the errors."
            TEST_STATUS="Failed"
          fi
          
          # Build the Discord payload dynamically
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg color "$COLOR" \
            --arg status "$TEST_STATUS" \
            --arg duration "$DURATION" \
            --arg files "$TEST_FILES" \
            --arg tests "$TEST_COUNT" \
            --arg branch "${{ github.head_ref || github.ref_name }}" \
            --arg commit "\`$COMMIT_SHORT\`" \
            --arg workflow "[View Run]($WORKFLOW_URL)" \
            --arg footer "Omnibus CI/CD • Test Suite" \
            --arg time "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: ($color | tonumber),
                fields: [
                  { name: "📊 Status", value: $status, inline: true },
                  { name: "⏱️ Duration", value: $duration, inline: true },
                  { name: "📁 Test Files", value: $files, inline: true },
                  { name: "🧪 Tests", value: $tests, inline: true },
                  { name: "🌿 Branch", value: $branch, inline: true },
                  { name: "🔗 Commit", value: $commit, inline: true },
                  { name: "⚙️ Workflow", value: $workflow, inline: false }
                ],
                footer: { text: $footer },
                timestamp: $time
              }]
            }' \
          )
          
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" -d "$PAYLOAD" $DISCORD_WEBHOOK
          fi