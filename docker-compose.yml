version: '3.8'

services:
  omnibus:
    image: hankscafe/omnibus:beta
    container_name: omnibus
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://192.168.1.100:3000 
      - NEXTAUTH_SECRET=change_this_to_a_random_secure_string_123!
      # Maps Prisma to save the database in the persistent config folder
      - DATABASE_URL=file:/config/omnibus.db 
    volumes:
      # Where Omnibus stores its database, settings, and downloaded covers
      - /path/to/your/nas/appdata/omnibus:/config 
      
      # Your physical comic/manga storage drives
      - /path/to/your/nas/comics:/comics
      - /path/to/your/nas/manga:/manga
      
      # Where your download client (qBit/SAB) puts finished files
      - /path/to/your/nas/downloads:/downloads